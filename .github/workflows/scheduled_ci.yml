# Scheduled Full CI
#
# Runs every Monday at 06:00 UTC, and can be triggered manually.
#
# Steps:
#   1. Scan all example directories.
#   2. Run them against stable, main, and rc Mesa.
#   3. Collect results, update registry, regenerate GALLERY.md.
#   4. Create/update/close the GitHub health issue.
#   5. Commit and push changes.

name: Scheduled Full CI

on:
  push:
    branches:
      - examples-revivl
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Step 1 — Discover all examples
  # --------------------------------------------------------------------------
  init-matrix:
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.set-matrix.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate example list
        id: set-matrix
        run: |
          EXAMPLES=$(python -c "
          import json; from pathlib import Path
          skip={'scripts','files','pulls','.git','.github','__pycache__','node_modules'}
          exs=set()
          for m in ['model.py','run.py','app.py']:
            for p in Path('.').rglob(m):
              d=p.parent
              if d.name==d.parent.name: d=d.parent
              if not any(x in skip or x.startswith('.') for x in d.parts): exs.add(str(d))
          result=sorted(exs)
          print(json.dumps([e for e in result if not any(e.startswith(o+'/') for o in result if o!=e)]))
          ")
          echo "examples=$EXAMPLES" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # Step 2 — Test via reusable workflow
  # --------------------------------------------------------------------------
  test-stable:
    needs: init-matrix
    uses: ./.github/workflows/example_validation.yml
    with:
      examples: ${{ needs.init-matrix.outputs.examples }}
      mesa_version: stable

  test-main:
    needs: init-matrix
    uses: ./.github/workflows/example_validation.yml
    with:
      examples: ${{ needs.init-matrix.outputs.examples }}
      mesa_version: main

  test-rc:
    needs: init-matrix
    uses: ./.github/workflows/example_validation.yml
    with:
      examples: ${{ needs.init-matrix.outputs.examples }}
      mesa_version: rc

  # --------------------------------------------------------------------------
  # Step 3 — Merge results, update registry + gallery, manage issue, commit
  # --------------------------------------------------------------------------
  update-and-publish:
    needs: [test-stable, test-main, test-rc, init-matrix]
    if: always() && needs.init-matrix.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      - uses: actions/download-artifact@v4
        with:
          path: all_results/

      - name: Prepare results structure
        run: |
          mkdir -p results/
          find all_results -type f -name "*.json" -exec cp {} results/ \;

      - name: Update registry files
        run: |
          python scripts/state/build_registry.py \
            --results-dir results/ \
            --registry-dir registry/ \
            --search-root .

      - name: Generate GALLERY.md
        run: |
          python scripts/presentation/render_gallery.py \
            --registry-dir registry/ \
            --output GALLERY.md

      - name: Update GitHub Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/presentation/manage_issues.py \
            --registry-dir registry/ \
            --repo "${{ github.repository }}"

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry/ GALLERY.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update registry and gallery [skip ci]"
            git pull --rebase origin ${GITHUB_REF#refs/heads/}
            git push
          fi
